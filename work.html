<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nested loop pattern</title>
   
       <style>
    body {
      font-family: Arial, sans-serif;
      background: greenyellow;
      text-align: center;
      padding: auto;
    }
    .container{
         background-color: gray;
         padding: 20px;
         border-radius:12px ;
         box-sizing: border-box;
    }
     </style>



   

</head>
<body>
 <div class="container">
    <h2 >number pattern generator</h2>
    <input type="number" id="num" placeholder="enter the number"><br>
     <button onclick="generatePattern()">Generate Pattern</button>
    <div id="output"></div>

 </div>
    <script>
 function generatePattern() {
      let n = document.getElementById("num").value;
      let output = "";

      for (let i = 1; i <= n; i++) {
        for (let j = 1; j <= i; j++) {
          output += j;
        }
        output += "\n";
      }

      document.getElementById("output").innerText = output;
    }
    </script>
</body>
</html>
