<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter App</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: red;
            margin-top: 100px;
        }

        .container {
            background:aqua;
            padding: 30px;
            width: 300px;
            margin: auto;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }

        h1 {
            margin-bottom: 20px;
        }

        #count {
            font-size: 40px;
            margin: 20px 0;
            color: #333;
        }

        button {
            padding: 10px 15px;
            margin: 5px;
            border: none;
           box-sizing: border-box;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            opacity: 0.8;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Counter App</h1>

       
        <div id="count">0</div>

       
        <button class="inc" onclick="increment()">Increment</button>
        <button class="dec" onclick="decrement()">Decrement</button>
        <button class="reset" onclick="reset()">Reset</button>
        <footer id="employees">
@ 2026 Project | Made by <span class="myname">pradhuman bhardwaj</span><br>
ADM NO; 2025B15410060 <br>
ROLL NO; 2503215400122<br>
CLASS ; CSE-DS-3
</footer>

    </div>
<script>
        
        let count = 0;

      
        function updateDisplay() {
            document.getElementById("count").innerText = count;
        }

       
        function increment() {
            count++;
            updateDisplay();
        }

       
        function decrement() {
            count--;
            updateDisplay();
        }

        
        function reset() {
            count = 0;
            updateDisplay();
        }
    </script>

    

</body>
</html>
